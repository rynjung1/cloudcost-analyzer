name: FinOps ETL Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipelines:
    runs-on: ubuntu-latest
    env:
      DLT_DESTINATION: postgres
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DESTINATION__POSTGRES__CREDENTIALS__HOST: ${{ secrets.DB_HOST }}
      DESTINATION__POSTGRES__CREDENTIALS__PORT: ${{ secrets.DB_PORT }}
      DESTINATION__POSTGRES__CREDENTIALS__USERNAME: ${{ secrets.DB_USER }}
      DESTINATION__POSTGRES__CREDENTIALS__PASSWORD: ${{ secrets.DB_PASSWORD }}
      DESTINATION__POSTGRES__CREDENTIALS__DATABASE: ${{ secrets.DB_NAME }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "dlt[postgres,parquet]" psycopg2-binary boto3 azure-identity azure-storage-blob azure-mgmt-costmanagement google-cloud-bigquery stripe

      - name: Run AWS pipeline
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/aws_pipeline.py

      - name: Run Azure pipeline
        if: always()
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: python pipelines/azure_pipeline.py

      - name: Authenticate to GCP
        if: always()
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run GCP pipeline
        if: always()
        run: python pipelines/gcp_pipeline.py

      - name: Run Stripe pipeline
        if: always()
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: python pipelines/stripe_pipeline.py
